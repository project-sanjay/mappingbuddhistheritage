<html>
    <head>
        <title>Add Category</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    </head>
    <body class="bg-dark text-white">
        <header th:insert="fragments/adminlayout.html :: header"> </header>
        <div class="container">
            <h5>Add New Category</h5>
            <form action="#" th:action="@{/dashboard/view_Category/saveCategory}" th:object="${category}" method="POST" enctype="multipart/form-data">

                <div class="form-group row">
                    <label class="col-form-label col-sm-4">Category Name: </label>
                    <div class="col-sm-8">
                        <input type="text" th:field="*{categoryname}" class="form-control mb-4 col-2" placeholder="Category Name" required>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-form-label col-sm-4">Category Image: </label>
                    <div class="col-sm-8">
                        <input type="file"  name="categoryimage" id="categoryimage"  class="form-control mb-4 col-2" required>
                    </div>
                </div>


                <div class="text-center p-3">
                    <button type="submit" class="btn btn-info col-2">Save Category</button>
                </div>
            </form> 
            <hr>
            <a th:href = "@{/dashboard/view_Category}"> Back to Category list</a>
        </div>
        <footer th:insert="fragments/adminlayout.html :: footer"></footer>

        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

    </body>
</html>
