<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <head>
        <title>View State</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

    </head>
    <body class="bg-dark text-white">
        <header th:insert="fragments/adminlayout.html :: header"> </header>
        <div class="container">
            <h1>State List</h1>
            <a th:href = "@{/dashboard/view_State/showNewStateForm}" class="btn btn-primary btn-sm mb-3"> Add State </a>
            <table border="1"  class="table table-responsive-md text-white">
                <thead>
                    <tr> 
                        <th>State Id</th>
                        <th>State Name</th>
                        <th>Country Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="state:${listState}">
                        <td th:text="${state.id_state}"></td>
                        <td th:text="${state.statename}"></td>
                        <td th:text="${state.country.countryname}"></td>
                        <td>
                            <a  class="btn btn-primary">Update</a>
                            <a th:href="@{/dashboard/view_State/delete_State/{id}(id=${state.id_state})}" class="btn btn-danger">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <footer th:insert="fragments/adminlayout.html :: footer"></footer>
        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

    </body>
</html>
