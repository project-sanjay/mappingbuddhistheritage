<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Add Country</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

    </head>
    <body class="bg-dark text-white">
        <header th:insert="fragments/adminlayout.html :: header"> </header>
        <div class="container">
            <h5>Add New Country</h5>
            <form action="#" th:action="@{/dashboard/view_Country/saveCountry}" th:object="${country}" method="POST">
                <input type="text" th:field="*{countryname}" class="form-control mb-4 col-2" placeholder="Country Name">
                <button type="submit" class="btn btn-info col-2"> Save Country</button>
            </form> 
            <hr>
            <a th:href = "@{/dashboard/view_Country}"> Back to Country list</a>
        </div>
        <footer th:insert="fragments/adminlayout.html :: footer"></footer>

        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

    </body>
</html>
