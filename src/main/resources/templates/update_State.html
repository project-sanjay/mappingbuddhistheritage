<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <head>
        <title>Update State</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

    </head>
    <body class="bg-dark text-white">
        <header th:insert="fragments/adminlayout.html :: header"> </header>
        <div class="container">
            <h2>Update State</h2>

            <form action="#" th:action="@{/dashboard/view_State/saveState}" th:object="${state}"
                  method="POST">

                <!-- Add hidden form field to handle update -->
                <div class="form-group row">
                    <label class="col-form-label col-sm-4">State Id: </label>
                    <div class="col-sm-8">
                        <input th:field="*{id_state}" readonly/>
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-form-label col-sm-4">Country Name: </label>
                    <div class="col-sm-8">
                        <input type="text" th:field="*{statename}" class="form-control mb-4 col-4">
                    </div>
                </div>
                <div class="form-group row">
                    <label class="col-form-label col-sm-4">Country Name: </label>
                    <div class="col-sm-8">
                        <select th:field="*{country}" class="form-control" required>
                            <th:block th:each="country:${listCountry}">
                                <option th:text="${country.countryname}" th:value="${country.id_country}"></option>
                            </th:block>
                        </select>
                    </div>
                </div>
                <div class="text-center p-3">
                    <button type="submit" class="btn btn-info col-2"> Update State</button>
                </div>

            </form>

            <hr>

            <a th:href = "@{/dashboard/view_State}"> Back to State List</a>
        </div>
        <footer th:insert="fragments/adminlayout.html :: footer"></footer>
        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>

    </body>
</html>
